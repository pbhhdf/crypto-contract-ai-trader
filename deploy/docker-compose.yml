services:
  trader:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: crypto-contract-ai-trader
    restart: unless-stopped
    ports:
      - "${TRADER_BIND_IP:-127.0.0.1}:${APP_PORT:-8787}:${APP_PORT:-8787}"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port=os.getenv('APP_PORT','8787'); urllib.request.urlopen(f'http://127.0.0.1:{port}/api/health', timeout=5).read()\""]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
